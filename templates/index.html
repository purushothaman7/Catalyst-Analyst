<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversion Rate Predictor</title>
    <style>
        body {
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select {
            padding: 5px;
            margin: 5px 0;
            width: 100%;
            max-width: 300px;
        }
        button {
            padding: 10px 20px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            width: 50%;
            font-weight: bold;
            border: solid 2px black;
            border-radius: 12px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
<center>
<h2>Conversion Rate Predictor 🧪</h2>
<form method="POST" action="/predict">
    <label for="temperature">Temperature (°C):</label>
    <input type="text" id="temperature" name="temperature" required>

    <label for="pressure">Pressure (MPa):</label>
    <input type="text" id="pressure" name="pressure" required>

    <label for="surface_area">Surface Area (m²/g):</label>
    <input type="text" id="surface_area" name="surface_area" required>

    <label for="reaction_time">Reaction Time (hours):</label>
    <input type="text" id="reaction_time" name="reaction_time" required>

    <label for="lignin_loading">Lignin Loading (wt%):</label>
    <input type="text" id="lignin_loading" name="lignin_loading" required>

    <label for="op_catalyst">Catalyst Used:</label>
    <select id="op_catalyst" name="op_catalyst" required>
        <option value="Choose">Choose</option>
        <option value="Fe-Fe3C/C">Fe-Fe3C/C</option>
        <option value="NiRu/Al₂O₃">NiRu/Al₂O₃</option>
        <option value="Ru/4-1AC">Ru/4-1AC</option>
        <option value="bimetallic NiCu/C catalyst">bimetallic NiCu/C catalyst</option>
        <option value="ZrO2, WOx, and MoO3">ZrO2, WOx, and MoO3</option>
        <option value="Ni3Co1-based MOFs">Ni3Co1-based MOFs</option>
        <option value="Ni 10% @Fe/NC 0.33 -800">Ni 10% @Fe/NC 0.33 -800</option>
        <option value="Ni 9 Cu 1 -Mo 2 C/AC">Ni 9 Cu 1 -Mo 2 C/AC</option>
        <option value="Ni 7 Fe 3 -Mo 2 C/AC">Ni 7 Fe 3 -Mo 2 C/AC</option>
        <option value="Ni-Ru/Al2O3">Ni-Ru/Al2O3</option>
        <option value="NiCoC">NiCoC</option>
        <option value="Pd/C (palladium on carbon) combined with NaOH">Pd/C (palladium on carbon) combined with NaOH</option>
        <option value="Ni 3 Al 3 -MMO">Ni 3 Al 3 -MMO</option>
        <option value="Ni-0.25% Pd/C in synergy with NaOH">Ni-0.25% Pd/C in synergy with NaOH</option>
        <option value="CuO/CeO2">CuO/CeO2</option>
        <option value="RuNi/C">RuNi/C</option>
        <option value="CuZnAl">CuZnAl</option>
        <option value="Ru₂Ni₁-NCNF">Ru₂Ni₁-NCNF</option>
        <option value="Pd-Zn/AC">Pd-Zn/AC</option>
        <option value="Ru/LNPC">Ru/LNPC</option>
        <option value="Ni₁.₅Fe₁.₅/Al₂O₃">Ni₁.₅Fe₁.₅/Al₂O₃</option>
        <option value="Ni/ZrP">Ni/ZrP</option>
        <option value="CaO/TiO2">CaO/TiO2</option>
        <option value="Ru-Cu/Zirconia">Ru-Cu/Zirconia</option>
        <option value="NixCoyAl">NixCoyAl</option>
        <option value="CeO2/AC">CeO2/AC</option>
        <option value="½Ru/Al2O3">½Ru/Al2O3</option>
        <option value="Pt/HAP-3">Pt/HAP-3</option>
        <option value="RuNi/SiO2-ZrO2">RuNi/SiO2-ZrO2</option>
        <option value="Hf(OTf)4 and Ru/c-Al2O3">Hf(OTf)4 and Ru/c-Al2O3</option>
        <option value="PTA/MCM-41">PTA/MCM-41</option>
        <option value="Ni 10%/TiN">Ni 10%/TiN</option>
        <option value="½Fe-Pd bimetallic catalyst supported on HZSM-5,">½Fe-Pd bimetallic catalyst supported on HZSM-5,</option>
        <option value="½N-STC">½N-STC</option>
        <option value="FeNi-ZrO2">FeNi-ZrO2</option>
        <option value="½NiMoS2">½NiMoS2</option>
        <option value="CuMgAlO x">CuMgAlO x</option>
        <option value="NiCo/C">NiCo/C</option>
        <option value="Ni/ZrP">Ni/ZrP</option>
        <option value="HZSM-5,">HZSM-5,</option>
        <option value="PdC">PdC</option>
        <option value="Pt-SnCNFI">Pt-SnCNFI</option>
        <option value="Ni/C">Ni/C</option>
        <option value="CoMoS">CoMoS</option>
        <option value="Ni2P-SiO2">Ni2P-SiO2</option>
        <option value="NiHZSM-5½">NiHZSM-5½</option>
        <option value="Ru/C and Pt/C">Ru/C and Pt/C</option>
        <option value="Ru-Ni12P5/S-1½">Ru-Ni12P5/S-1½</option>
        <option value="HPS">HPS</option>
        <option value="Ru/C">Ru/C</option>
        <option value="Co½ Al2O3 @USY">Co½ Al2O3 @USY</option>
        <option value="½Ni-MgO/SiO2">½Ni-MgO/SiO2</option>
        <option value="NiMo/Al-MCM-41">NiMo/Al-MCM-41</option>
        <option value="Pd/C">Pd/C</option>
        <option value="NiO/HZSM">NiO/HZSM</option>
        <option value="transition-metal catalysts">transition-metal catalysts</option>
        <option value="NiCu/C">NiCu/C</option>
        <option value="Ni/(Fe/Zn/Co/Mo/Cu)-WO2/Al2O3">Ni/(Fe/Zn/Co/Mo/Cu)-WO2/Al2O3</option>
        <option value="Ni/ZrO2">Ni/ZrO2</option>
        <option value="Ni 5 Fe 5 /Al 2 O 3">Ni 5 Fe 5 /Al 2 O 3</option>
        <option value="20NiMoP/AC">20NiMoP/AC</option>
        <option value="Co-Zn/Off-Al H-beta">Co-Zn/Off-Al H-beta</option>
        <option value="Pd/C, Fe/C, Co/C, and Ni/C">Pd/C, Fe/C, Co/C, and Ni/C</option>
        <option value="½Pd-zeolite Y">½Pd-zeolite Y</option>
        <option value="½15Ni/SA-Zr">½15Ni/SA-Zr</option>
        <option value="NaOH,½KOH and ½NaCO2">NaOH,½KOH and ½NaCO2</option>
        <option value="Ru and Ni">Ru and Ni</option>
        <option value="Ru/C">Ru/C</option>
        <option value="MoS, NiS/MoS, CoS/MoS and Ag3S/MoS">MoS, NiS/MoS, CoS/MoS and Ag3S/MoS</option>
        <option value="3Ni-1.5Ru/H-ZSM-5">3Ni-1.5Ru/H-ZSM-5</option>
        <option value="5 wt% Ru/C and 5 wt% Pd/C">5 wt% Ru/C and 5 wt% Pd/C</option>
        <option value="½Pt-Ni/SiO2 and Pt-Ni-Cr/Al2O3">½Pt-Ni/SiO2 and Pt-Ni-Cr/Al2O3</option>
        <option value="Ni 1.2 -ZrO 2 /WO 3 /Al 2 O 3">Ni 1.2 -ZrO 2 /WO 3 /Al 2 O 3</option>
        <option value="Ni2WOx/NiAl2O4">Ni2WOx/NiAl2O4</option>
        <option value="Pt/HZSM-23">Pt/HZSM-23</option>
        <option value="Pt2Ru">Pt2Ru</option>
        <option value="Pd/C in combination with CrCl2">Pd/C in combination with CrCl2</option>
        <option value="ReS2/Al2O3">ReS2/Al2O3</option>
        <option value="Hf(OTf)4 (a super Lewis acid) and Ru/Al2O3">Hf(OTf)4 (a super Lewis acid) and Ru/Al2O3</option>
        <option value="NiAl alloy">NiAl alloy</option>
        <option value="Nb 2 Ni 1 /Zno2Al 2 O 3">Nb 2 Ni 1 /Zno2Al 2 O 3</option>
        <option value="2.5 wt % Ru and 10 wt % Ni">2.5 wt % Ru and 10 wt % Ni</option>
        <option value="3%Pd-1%Ni/AC">3%Pd-1%Ni/AC</option>
        <option value="H3WO2 and Ru/C">H3WO2 and Ru/C</option>
        <option value="½Ni/MgO">½Ni/MgO</option>
        <option value="Ru/C, Ni/ZSM-5, and CuNiAl">Ru/C, Ni/ZSM-5, and CuNiAl</option>
        <option value="Ni/CaO-HZSM-5">Ni/CaO-HZSM-5</option>
        
    </select>
    <br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <div class="result">
        <p>Predicted Conversion Rate: {{ prediction }}%</p>
        <p>Catalyst Used: {{ catalyst }}</p>
    </div>
{% endif %}

{% if error %}
    <div class="error">
        <p>Error: {{ error }}</p>
    </div>
{% endif %}
</center>
</body>
</html>
